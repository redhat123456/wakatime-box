name: WakaTime Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '10 3 * * *'

permissions:
  contents: read

jobs:
  update-wakatime-gist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Update WakaTime Gist
        uses: abordage/wakatime-box@main
        with:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          WAKA_API_KEY: ${{ secrets.WAKA_API_KEY }}
